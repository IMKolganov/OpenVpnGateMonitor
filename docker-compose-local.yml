services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        TARGETARCH: ${TARGETARCH:?TARGETARCH is required}
        BUILD_CONFIGURATION: ${BUILD_CONFIGURATION:?BUILD_CONFIGURATION is required}
    container_name: open-vpn-gate-monitor-backend
    restart: always
    networks:
      - openvpn_network
      - backend_network
    volumes:
      - backend_data:/app/resources
    ports:
      - "5581:5581"
    depends_on:
      - postgres_backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://0.0.0.0:5581
      DOTNET_RUNNING_IN_CONTAINER: "true"

      # DB on host (or via host port back to postgres container)
      DB_CONNECTION_STRING_DATAGATE: ${DB_CONNECTION_STRING_DATAGATE:-Host=host.docker.internal;Port=5432;Database=datagate_backend;Username=backend_user;Password=securepassword_backend}
      DB_DEFAULT_SCHEMA: xgb_dashopnvpn
      DB_MIGRATION_TABLE: __EFMigrationsHistoryDashboardVpn

      # Elastic on host
      ELASTIC_URI: ${ELASTIC_URI:-http://host.docker.internal:9200}
      ELASTIC_USERNAME: ${ELASTIC_USERNAME:-elastic}
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD:-your-password}
      ELASTIC_INDEX_FORMAT: ${ELASTIC_INDEX_FORMAT:-OpenVPNGateMonitor-dev-logs-{0:yyyy.MM.dd}}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: open-vpn-gate-monitor-frontend
    restart: always
    networks:
      - openvpn_network
    ports:
      - "5582:5582"
    depends_on:
      - backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # backend via host
      BACKEND_URL: http://host.docker.internal:5581

  telegrambot:
    build:
      context: ./telegrambot
      dockerfile: Dockerfile
      args:
        TARGETARCH: ${TARGETARCH:?TARGETARCH is required}
        BUILD_CONFIGURATION: ${BUILD_CONFIGURATION:?BUILD_CONFIGURATION is required}
    container_name: open-vpn-gate-monitor-telegrambot
    restart: always
    networks:
      - backend_network
      - tgbot_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}

      TELEGRAMBOT_PORT: ${TELEGRAMBOT_PORT:-443}
      TELEGRAMBOT_BOT_TOKEN: ${TELEGRAMBOT_BOT_TOKEN:-your-token}
      HOST_ADDRESS: localhost

      USE_CERTIFICATE: ${USE_CERTIFICATE:-true}
      AUTO_GENERATE_CERTIFICATE: ${AUTO_GENERATE_CERTIFICATE:-true}
      CERTIFICATE_PFX_PATH: /app/datagatetgbot.pfx
      CERTIFICATE_PEM_PATH: /app/datagatetgbot.pem

      # backend via host
      DASHBOARDAPI_URL: http://host.docker.internal:5581/api
      DASHBOARDAPI_CLIENTID: ${DASHBOARDAPI_CLIENTID:-your-client-id}
      DASHBOARDAPI_CLIENTSECRET: ${DASHBOARDAPI_CLIENTSECRET:-your-client-secret}

      # elastic via host
      ELASTIC_URI: ${ELASTIC_URI:-http://host.docker.internal:9200}
      ELASTIC_USERNAME: ${ELASTIC_USERNAME:-elastic}
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD:-your-password}
      ELASTIC_INDEX_FORMAT: ${ELASTIC_INDEX_FORMAT:-DataGateVPNBot-dev-logs-{0:yyyy.MM.dd}}

    ports:
      - "${TELEGRAMBOT_PORT:-443}:${TELEGRAMBOT_PORT:-443}"

  openvpn_udp:
    build:
      context: ./openvpn
      dockerfile: Dockerfile
    container_name: openvpn_udp
    restart: unless-stopped
    networks:
      - backend_network
    cap_add:
      - NET_ADMIN
    devices:
      - "/dev/net/tun:/dev/net/tun"
    volumes:
      - openvpn_data_udp:/openvpn-udp
    ports:
      - "1194:1194/udp"
      - "5010:5010"
      - "5092:5092"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}

      EASY_RSA_PATH: "/openvpn-udp/easy-rsa"
      DATA_DIR: /openvpn-udp
      PORT: "1194"
      API_PORT: 5010
      PROTO: udp

      # management остаётся localhost внутри контейнера — это ок
      OpenVpnManagement__Host: localhost
      OpenVpnManagement__Port: "5092"

      # backend via host
      BACKEND__BASEURL: http://host.docker.internal:5581/

  openvpn_tcp:
    build:
      context: ./openvpn
      dockerfile: Dockerfile
    container_name: openvpn_tcp
    restart: unless-stopped
    networks:
      - backend_network
      - openvpn_network
    cap_add:
      - NET_ADMIN
    devices:
      - "/dev/net/tun:/dev/net/tun"
    volumes:
      - openvpn_data_tcp:/openvpn-tcp
    ports:
      - "1195:1195"
      - "5011:5011"
      - "5093:5093"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}

      EASY_RSA_PATH: "/openvpn-tcp/easy-rsa"
      DATA_DIR: /openvpn-tcp
      PORT: "1195"
      API_PORT: 5011
      PROTO: tcp

      # management тоже внутри контейнера
      OpenVpnManagement__Host: localhost
      OpenVpnManagement__Port: "5093"

      # backend via host
      BACKEND__BASEURL: http://host.docker.internal:5581/

  postgres_backend:
    image: postgres:latest
    container_name: datagate_postgres_backend
    restart: always
    networks:
      - backend_network
      - openvpn_network
    volumes:
      - postgres_data_backend:/var/lib/postgresql
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: datagate_backend
      POSTGRES_USER: backend_user
      POSTGRES_PASSWORD: securepassword_backend

volumes:
  openvpn_data_tcp:
  openvpn_data_udp:
  postgres_data_backend:
  backend_data:

networks:
  openvpn_network:
    driver: bridge
  backend_network:
    driver: bridge
  tgbot_network:
    driver: bridge
